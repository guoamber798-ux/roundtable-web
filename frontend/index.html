<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>思维圆桌 · Roundtable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="grain"></div>

  <header class="site-header">
    <div class="logo">
      <span class="logo-icon">◉</span>
      <div>
        <h1>思维圆桌</h1>
        <p class="tagline">十五位大师 · 四轮思辨 · 共识收敛</p>
      </div>
    </div>
    <button type="button" class="btn-ghost" id="btnSettings" aria-label="设置">⚙ API</button>
  </header>

  <main class="main">
    <!-- Step 1: Select masters -->
    <section class="panel" id="stepSelect">
      <div class="panel-head">
        <span class="step-badge">01</span>
        <h2>选择大师</h2>
        <p class="hint">最多选择 <strong>4</strong> 位参与本次圆桌（已选 <span id="selectedCount">0</span>/4）</p>
      </div>
      <div class="masters-grid" id="mastersGrid"></div>
    </section>

    <!-- Step 2: Question -->
    <section class="panel" id="stepQuestion">
      <div class="panel-head">
        <span class="step-badge">02</span>
        <h2>提出你的问题</h2>
        <p class="hint">大师将经历：第一轮独立观点 → 第二轮交叉辩论 → 共识收敛（总输出 ≤3500 字）</p>
      </div>
      <textarea
        id="questionInput"
        rows="4"
        placeholder="例如：独立开发应该先做产品还是先做内容？我该如何找到最适合自己的事业方向？"
        maxlength="2000"
      ></textarea>
      <div class="actions">
        <button type="button" class="btn-primary" id="btnStart" disabled>
          开启圆桌对谈
        </button>
      </div>
    </section>

    <!-- Results -->
    <section class="panel panel-results hidden" id="stepResults">
      <div class="panel-head">
        <span class="step-badge">03</span>
        <h2>对谈实录</h2>
        <p class="hint char-count">输出字数：<span id="charCount">0</span> / 3500</p>
      </div>
      <div id="resultsContent"></div>
      <div class="actions">
        <button type="button" class="btn-ghost" id="btnReset">新的对谈</button>
      </div>
    </section>
  </main>

  <!-- Loading overlay -->
  <div class="overlay hidden" id="loadingOverlay">
    <div class="loader-card">
      <div class="loader-ring"></div>
      <p class="loader-title">圆桌进行中</p>
      <p class="loader-step" id="loaderStep">大师们正在思考…</p>
      <p class="loader-hint">约需 1–3 分钟，请耐心等待</p>
    </div>
  </div>

  <!-- Settings modal -->
  <dialog class="modal" id="settingsModal">
    <form method="dialog" class="modal-inner">
      <h3>API 设置</h3>
      <p class="modal-desc" id="settingsDesc">使用 OpenAI API 驱动圆桌讨论。</p>
      <label>
        OpenAI API Key
        <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" />
      </label>
      <label>
        模型
        <select id="modelSelect">
          <option value="gpt-4o-mini">gpt-4o-mini（推荐，省钱）</option>
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini</option>
          <option value="gpt-4.1">gpt-4.1</option>
        </select>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="btnClearKey">清除 Key</button>
        <button type="submit" class="btn-primary">保存</button>
      </div>
    </form>
  </dialog>

  <footer class="site-footer">
    <p>人物设定内置 · 无需安装 nuwa · 输出上限 3500 字/问</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
