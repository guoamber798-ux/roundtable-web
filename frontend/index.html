<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TopTalk领晤</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grain"></div>

  <!-- 登录/注册门禁 -->
  <div class="auth-gate" id="authGate">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="logo-icon">◈</span>
        <h1>TopTalk<em>领晤</em></h1>
        <p>与十五位大师深度对谈，洞察你的关键决策</p>
      </div>
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">登录</button>
        <button type="button" class="auth-tab" data-tab="register">注册</button>
      </div>
      <form id="loginForm" class="auth-form">
        <label>用户名<input type="text" id="loginUser" autocomplete="username" required /></label>
        <label>密码<input type="password" id="loginPass" autocomplete="current-password" required /></label>
        <button type="submit" class="btn-primary btn-block">登录</button>
      </form>
      <form id="registerForm" class="auth-form hidden">
        <label>用户名<input type="text" id="regUser" autocomplete="username" required placeholder="3-32位字母数字中文" /></label>
        <label>密码<input type="password" id="regPass" autocomplete="new-password" required placeholder="至少6位" /></label>
        <button type="submit" class="btn-primary btn-block">创建账户</button>
      </form>
      <p class="auth-error hidden" id="authError"></p>
    </div>
  </div>

  <header class="site-header hidden" id="appHeader">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <div>
        <h1>TopTalk<em class="brand-en">领晤</em></h1>
        <p class="tagline">十五位大师 · 深度思辨 · 共识收敛</p>
      </div>
    </div>
    <div class="header-right">
      <span class="model-badge hidden" id="modelBadge" title="当前模型"></span>
      <span class="credits-badge auth-only" id="creditsBadge" title="剩余领晤次数">0 次</span>
      <button type="button" class="btn-ghost btn-sm auth-only" id="btnRedeem">兑换口令</button>
      <button type="button" class="btn-ghost btn-sm auth-only" id="btnLogout">退出</button>
    </div>
  </header>

  <main class="main hidden" id="appMain">
    <section class="panel" id="stepSelect">
      <div class="panel-head">
        <span class="step-badge">01</span>
        <h2>选择大师</h2>
        <p class="hint">最多选择 <strong>4</strong> 位参与本次领晤（已选 <span id="selectedCount">0</span>/4）</p>
      </div>
      <div id="loadError" class="load-error hidden"></div>
      <div class="masters-grid" id="mastersGrid">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
    </section>

    <section class="panel" id="stepQuestion">
      <div class="panel-head">
        <span class="step-badge">02</span>
        <h2>提出你的问题</h2>
        <p class="hint">第一轮独立观点 → 第二轮交叉辩论 → 共识收敛（≤3500 字）</p>
      </div>
      <textarea
        id="questionInput"
        rows="4"
        placeholder="例如：我该如何找到最适合自己的事业方向？"
        maxlength="2000"
      ></textarea>
      <div class="actions">
        <button type="button" class="btn-primary" id="btnStart" disabled>
          开启领晤
        </button>
      </div>
    </section>

    <section class="panel panel-results hidden" id="stepResults">
      <div class="panel-head">
        <span class="step-badge">03</span>
        <h2>领晤实录</h2>
        <p class="hint char-count">输出字数：<span id="charCount">0</span> / 3500</p>
      </div>
      <div id="resultsContent"></div>
      <div class="actions">
        <button type="button" class="btn-ghost" id="btnReset">新的领晤</button>
      </div>
    </section>
  </main>

  <div class="overlay hidden" id="loadingOverlay">
    <div class="loader-card">
      <div class="loader-ring"></div>
      <p class="loader-title">领晤进行中</p>
      <p class="loader-step" id="loaderStep">大师们正在思考…</p>
      <p class="loader-hint">约需 1–3 分钟，请耐心等待</p>
    </div>
  </div>

  <dialog class="modal" id="redeemModal">
    <form method="dialog" class="modal-inner" id="redeemForm">
      <h3>兑换口令</h3>
      <p class="modal-desc">输入购买的口令，兑换领晤次数。每次领晤消耗 1 次机会。</p>
      <label>
        口令
        <input type="text" id="redeemCodeInput" placeholder="请输入购买口令" autocomplete="off" required />
      </label>
      <p class="auth-error hidden" id="redeemError"></p>
      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="btnRedeemCancel">取消</button>
        <button type="submit" class="btn-primary">兑换</button>
      </div>
    </form>
  </dialog>

  <footer class="site-footer hidden" id="appFooter">
    <p id="footerText">TopTalk领晤 · 人物设定内置</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
