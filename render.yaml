# Render.com 一键部署：https://render.com
# Dashboard → New → Blueprint → 连接本仓库

services:
  - type: web
    name: roundtable-web
    runtime: docker
    plan: free
    healthCheckPath: /api/config
    envVars:
      - key: AUTH_REQUIRED
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: FAKA_WEBHOOK_SECRET
        sync: false
      - key: INITIAL_CODES
        value: "TOPTALK-DEMO:2"
      - key: DEFAULT_MODEL
        value: claude-sonnet-4-5-20250929
      - key: API_PROVIDER
        value: anthropic
      - key: ANTHROPIC_BASE_URL
        value: https://www.right.codes/claude
      - key: RATE_LIMIT_PER_HOUR
        value: "20"
      - key: DATABASE_PATH
        value: /app/data/toptalk.db
      - key: PORT
        value: "8765"
